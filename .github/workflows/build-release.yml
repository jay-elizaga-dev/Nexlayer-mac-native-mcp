name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (Release)
        run: swift build --configuration release

      - name: Create .app bundle
        run: |
          APP=MacNativeMCP.app
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"

          cp .build/release/MacNativeMCP "$APP/Contents/MacOS/"

          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>MacNativeMCP</string>
            <key>CFBundleDisplayName</key>
            <string>Mac Native MCP</string>
            <key>CFBundleIdentifier</key>
            <string>dev.elizaga.mac-native-mcp</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleExecutable</key>
            <string>MacNativeMCP</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>NSPrincipalClass</key>
            <string>NSApplication</string>
            <key>NSHumanReadableCopyright</key>
            <string>© 2026 Elizaga.Dev</string>
            <key>NSAppTransportSecurity</key>
            <dict>
              <key>NSAllowsArbitraryLoads</key>
              <true/>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Ad-hoc code sign
        run: codesign --force --deep --sign - MacNativeMCP.app

      - name: Create .dmg
        run: |
          mkdir dmg_staging
          cp -r MacNativeMCP.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -srcfolder dmg_staging \
            -volname "Mac Native MCP" \
            -format UDZO \
            -o MacNativeMCP.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Mac Native MCP ${{ github.ref_name }}
          body: |
            ## Mac Native MCP ${{ github.ref_name }}

            Native macOS MCP (Model Context Protocol) client — Admiral-style dark UI.

            ### Install
            1. Download `MacNativeMCP.dmg`
            2. Open the `.dmg`, drag `MacNativeMCP.app` to Applications
            3. Right-click → Open (first launch, bypasses Gatekeeper for ad-hoc signed builds)

            ### Requirements
            - macOS 14.0 (Sonoma) or later
            - Apple Silicon or Intel Mac

            ### What's included
            - Stdio MCP server management (add any MCP server by command + args)
            - Multi-panel workspace: servers, conversation, output viewer
            - Dark hand-tuned color palette matching [admiralai.dev](https://www.admiralai.dev)
            - Native SwiftUI — no Electron, no web views
          files: MacNativeMCP.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
